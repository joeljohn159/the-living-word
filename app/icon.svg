<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d07a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.3"/>
  <!-- Open book - left page -->
  <path d="M256 180 C256 180 240 170 140 170 L100 170 C90 170 82 178 82 188 L82 360 C82 370 90 378 100 378 L240 378 C248 378 256 372 256 372" fill="url(#page)" opacity="0.95"/>
  <!-- Open book - right page -->
  <path d="M256 180 C256 180 272 170 372 170 L412 170 C422 170 430 178 430 188 L430 360 C430 370 422 378 412 378 L272 378 C264 378 256 372 256 372" fill="url(#page)" opacity="0.9"/>
  <!-- Book spine shadow -->
  <path d="M256 175 L256 376" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>
  <!-- Text lines - left page -->
  <line x1="110" y1="210" x2="230" y2="210" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="230" x2="220" y2="230" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="250" x2="235" y2="250" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="270" x2="215" y2="270" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="290" x2="228" y2="290" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="310" x2="210" y2="310" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="330" x2="225" y2="330" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="110" y1="350" x2="200" y2="350" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <!-- Text lines - right page -->
  <line x1="282" y1="210" x2="402" y2="210" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="230" x2="392" y2="230" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="250" x2="407" y2="250" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="270" x2="387" y2="270" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="290" x2="400" y2="290" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="310" x2="382" y2="310" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="330" x2="397" y2="330" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="282" y1="350" x2="375" y2="350" stroke="#1a1a2e" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <!-- Cross above book -->
  <rect x="247" y="80" width="18" height="80" rx="3" fill="url(#gold)"/>
  <rect x="225" y="100" width="62" height="18" rx="3" fill="url(#gold)"/>
  <!-- Light glow behind cross -->
  <circle cx="256" cy="120" r="50" fill="#f5d07a" opacity="0.08"/>
  <circle cx="256" cy="120" r="30" fill="#f5d07a" opacity="0.06"/>
  <!-- Small decorative dots -->
  <circle cx="256" cy="420" r="4" fill="url(#gold)" opacity="0.5"/>
  <circle cx="240" cy="420" r="2.5" fill="url(#gold)" opacity="0.3"/>
  <circle cx="272" cy="420" r="2.5" fill="url(#gold)" opacity="0.3"/>
</svg>
